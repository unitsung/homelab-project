name: Update AltStore Source

on:
  release:
    types: [published, edited]

permissions:
  contents: write

concurrency:
  group: update-altstore
  cancel-in-progress: false

jobs:
  update-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Update apps.json
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          DATE=$(date -u +%Y-%m-%d)

          # Find the IPA asset URL and size
          IPA_URL=""
          IPA_SIZE=0
          for asset in $(echo '${{ toJSON(github.event.release.assets) }}' | jq -r '.[] | @base64'); do
            name=$(echo "$asset" | base64 -d | jq -r '.name')
            if [[ "$name" == *.ipa ]]; then
              IPA_URL=$(echo "$asset" | base64 -d | jq -r '.browser_download_url')
              IPA_SIZE=$(echo "$asset" | base64 -d | jq -r '.size')
              break
            fi
          done

          if [ -z "$IPA_URL" ]; then
            echo "No .ipa file found in release assets, skipping update"
            exit 0
          fi

          # Extract buildVersion + minOSVersion from the IPA itself so the source
          # always matches the exact metadata SideStore/AltStore reads from the app.
          curl -L "$IPA_URL" -o release.ipa
          APP_METADATA=$(python3 - <<'PY'
          import fnmatch
          import json
          import plistlib
          import zipfile

          with zipfile.ZipFile("release.ipa") as ipa:
              info_name = next(
                  name for name in ipa.namelist()
                  if fnmatch.fnmatch(name, "Payload/*.app/Info.plist")
              )
              with ipa.open(info_name) as fp:
                  info = plistlib.load(fp)

          print(json.dumps({
              "buildVersion": str(info["CFBundleVersion"]),
              "minOSVersion": str(info.get("MinimumOSVersion", "18.0")),
          }))
          PY
          )
          BUILD_VERSION=$(echo "$APP_METADATA" | jq -r '.buildVersion')
          MIN_OS_VERSION=$(echo "$APP_METADATA" | jq -r '.minOSVersion')

          # Create new version entry
          NEW_VERSION=$(jq -n \
            --arg ver "$VERSION" \
            --arg build "$BUILD_VERSION" \
            --arg date "$DATE" \
            --arg desc "$RELEASE_BODY" \
            --arg url "$IPA_URL" \
            --arg min_os "$MIN_OS_VERSION" \
            --argjson size "$IPA_SIZE" \
            '{
              version: $ver,
              buildVersion: $build,
              date: $date,
              localizedDescription: $desc,
              downloadURL: $url,
              size: $size,
              minOSVersion: $min_os
            }')

          # Remove any existing entry with the same version, then prepend the new one
          jq --argjson new_ver "$NEW_VERSION" \
            '.apps[0].versions = [$new_ver] + [.apps[0].versions[] | select(.version != $new_ver.version)]' \
            apps.json > apps_tmp.json && mv apps_tmp.json apps.json

          # Add news entry — skip markdown header lines, use first real content line as title
          CLEAN_TITLE=$(echo "$RELEASE_BODY" | grep -v '^\s*#' | grep -v '^\s*$' | head -1)
          CLEAN_CAPTION=$(echo "$RELEASE_BODY" | grep -v '^\s*#' | grep -v '^\s*$' | head -3 | tr '\n' ' ' | sed 's/  */ /g' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          NEW_NEWS=$(jq -n \
            --arg title "$RELEASE_TAG — $CLEAN_TITLE" \
            --arg id "release-$VERSION" \
            --arg caption "$CLEAN_CAPTION" \
            --arg date "$DATE" \
            --arg url "https://github.com/${{ github.repository }}/releases/tag/$RELEASE_TAG" \
            '{
              title: $title,
              identifier: $id,
              caption: $caption,
              date: $date,
              tintColor: "#4A90D9",
              notify: true,
              url: $url,
              appID: "homelab.foreverhomelab"
            }')

          jq --argjson new_news "$NEW_NEWS" \
            '.news = [$new_news] + [.news[] | select(.identifier != $new_news.identifier)]' \
            apps.json > apps_tmp.json && mv apps_tmp.json apps.json

          echo "Updated apps.json to version $VERSION"

      - name: Update app-version.json
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          VERSION="${RELEASE_TAG#v}"

          # Find direct download URLs for IPA and APK
          IPA_URL=""
          APK_URL=""
          for asset in $(echo '${{ toJSON(github.event.release.assets) }}' | jq -r '.[] | @base64'); do
            name=$(echo "$asset" | base64 -d | jq -r '.name')
            url=$(echo "$asset" | base64 -d | jq -r '.browser_download_url')
            if [[ "$name" == *.ipa ]]; then
              IPA_URL="$url"
            elif [[ "$name" == *.apk ]]; then
              APK_URL="$url"
            fi
          done

          # Fall back to releases page if assets not found
          RELEASES_URL="https://github.com/${{ github.repository }}/releases/tag/$RELEASE_TAG"
          [ -z "$IPA_URL" ] && IPA_URL="$RELEASES_URL"
          [ -z "$APK_URL" ] && APK_URL="$RELEASES_URL"

          # Strip markdown headers for in-app changelog display
          CHANGELOG=$(echo "$RELEASE_BODY" | sed 's/^#* *//')

          jq --arg ver "$VERSION" \
             --arg cl "$CHANGELOG" \
             --arg ios "$IPA_URL" \
             --arg android "$APK_URL" \
            '.latest = $ver | .changelog = $cl | .ios_url = $ios | .android_url = $android' \
            app-version.json > app_ver_tmp.json && mv app_ver_tmp.json app-version.json

          echo "Updated app-version.json to version $VERSION"
          echo "  ios_url: $IPA_URL"
          echo "  android_url: $APK_URL"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps.json app-version.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update AltStore source and app-version to ${{ github.event.release.tag_name }}"
          git pull --rebase origin main
          git push origin HEAD:main
